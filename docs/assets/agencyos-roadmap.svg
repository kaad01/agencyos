<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="520" rx="36" fill="#F8F6EF"/>
  <text x="70" y="92" font-family="Inter, system-ui" font-size="48" font-weight="900" letter-spacing="-2" fill="#17201B">Roadmap: from useful prototype to credible SaaS alternative</text>
  <text x="70" y="132" font-family="Inter, system-ui" font-size="20" fill="#66736B">Short loops, real agency value first, polish after the workflow works.</text>
  <g font-family="Inter, system-ui">
    <rect x="70" y="190" width="285" height="220" rx="28" fill="#17201B"/><text x="104" y="245" font-size="18" font-weight="900" fill="#A6EF82">LOOP 1</text><text x="104" y="284" font-size="28" font-weight="900" fill="white">Foundation</text><text x="104" y="324" font-size="17" fill="#DCE8DF">Auth, workspaces, PostgreSQL, Prisma, seed data.</text><text x="104" y="372" font-size="15" font-weight="850" fill="#A6EF82">In progress</text>
    <rect x="390" y="190" width="285" height="220" rx="28" fill="#FFFFFF" stroke="#E6DDCF"/><text x="424" y="245" font-size="18" font-weight="900" fill="#FF6B35">LOOP 2</text><text x="424" y="284" font-size="28" font-weight="900" fill="#17201B">Core CRUD</text><text x="424" y="324" font-size="17" fill="#66736B">Detail views, edit/delete flows, validation, assignments.</text><text x="424" y="372" font-size="15" font-weight="850" fill="#FF6B35">Next</text>
    <rect x="710" y="190" width="285" height="220" rx="28" fill="#FFFFFF" stroke="#E6DDCF"/><text x="744" y="245" font-size="18" font-weight="900" fill="#FF6B35">LOOP 3</text><text x="744" y="284" font-size="28" font-weight="900" fill="#17201B">Time workflow</text><text x="744" y="324" font-size="17" fill="#66736B">Timer, weekly timesheets, real report rollups.</text><text x="744" y="372" font-size="15" font-weight="850" fill="#FF6B35">Planned</text>
    <rect x="1030" y="190" width="285" height="220" rx="28" fill="#FFFFFF" stroke="#E6DDCF"/><text x="1064" y="245" font-size="18" font-weight="900" fill="#FF6B35">LOOP 4</text><text x="1064" y="284" font-size="28" font-weight="900" fill="#17201B">Reports & polish</text><text x="1064" y="324" font-size="17" fill="#66736B">Onboarding, filters, profitability-lite, empty states.</text><text x="1064" y="372" font-size="15" font-weight="850" fill="#FF6B35">After core</text>
  </g>
</svg>
