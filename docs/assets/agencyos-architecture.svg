    <path d="M670 270H765" stroke="#A6EF82" stroke-width="8" stroke-linecap="round"/>
    <rect x="780" y="215" width="225" height="110" rx="26" fill="#F8F6EF"/><text x="892" y="278" text-anchor="middle" font-size="24" fill="#17201B">Prisma</text>
