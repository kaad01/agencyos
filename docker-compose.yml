services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agencyos
      POSTGRES_PASSWORD: agencyos
      POSTGRES_DB: agencyos
    ports:
      - "5432:5432"
    volumes:
      - agencyos_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agencyos -d agencyos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agencyos_postgres:
